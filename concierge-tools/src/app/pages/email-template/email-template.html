<div class="templates-grid">
  @for (template of templates; track template.id) {
    <div class="template-card">

      <div class="card-actions">

        <button
          class="subject-btn"
          type="button"
          [class.copied]="subjectCopied() === template.id"
          (click)="copy(template.subject, 'subject', template.id)"
        >
          {{
            subjectCopied() === template.id
              ? '✓ Copied!'
              : 'Subject'
          }}
        </button>

        <button
          class="body-btn"
          type="button"
          [class.copied]="bodyCopied() === template.id"
          (click)="copy(template.body, 'body', template.id)"
        >
          {{
            bodyCopied() === template.id
              ? '✓ Copied!'
              : 'Body'
          }}
        </button>

      </div>

      <span class="category">
        {{ template.category }}
      </span>

      <h3>{{ template.title }}</h3>

      <div class="subject-preview">
        {{ template.subject }}
      </div>

      <div class="body-preview">
        {{ template.body }}
      </div>

    </div>
  }
</div>
